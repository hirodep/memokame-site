<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memokame — Custom Pet Sticker Keepsakes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5EFE7;
    --surface:#FBF7F1;
    --surface-2:#FFFFFF;
    --border:#E9DFD3;
    --ink:#3D2F2E;
    --ink-soft:#8A7A72;
    --gold:#E0A458;
    --gold-dark:#C98A3A;
    --gold-text:#4A2E35;
    --rose:#C16D79;
    --rose-light:#D98A93;
    --rose-text:#4A2E35;
    --matcha:#8FA184;
    --lavender:#AC9CC0;
    --radius-lg:20px;
    --radius-md:14px;
    --radius-sm:9px;
    --shadow: 0 2px 14px rgba(61,47,46,0.06);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Zen Kaku Gothic New', -apple-system, sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-top:38px;
  }
  h1,h2,h3,.brandfont{ font-family:'Zen Maru Gothic', 'Zen Kaku Gothic New', sans-serif; font-weight:700; margin:0; }
  p{ margin:0; }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; }
  ::selection{ background:var(--gold); color:var(--gold-text); }

  /* ---------- prototype switcher (not part of real site) ---------- */
  #proto-bar{
    position:fixed; top:0; left:0; right:0; height:38px; z-index:999;
    background:#2C2C2A; color:#EDE7DE;
    display:flex; align-items:center; gap:4px; padding:0 12px;
    font-size:12px; overflow-x:auto; white-space:nowrap;
  }
  #proto-bar span.lbl{ opacity:0.55; margin-right:8px; flex-shrink:0; }
  #proto-bar button{
    background:transparent; border:1px solid rgba(255,255,255,0.18); color:#EDE7DE;
    padding:5px 10px; border-radius:20px; font-size:12px; flex-shrink:0;
  }
  #proto-bar button.active{ background:var(--gold); color:var(--gold-text); border-color:var(--gold); }

  /* ---------- layout helpers ---------- */
  .wrap{ max-width:1080px; margin:0 auto; padding:0 24px; }
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:13px 26px; border-radius:30px; border:none; font-size:15px; font-weight:500;
    transition:transform .15s ease, opacity .15s ease;
  }
  .btn:hover{ transform:translateY(-1px); }
  .btn:active{ transform:translateY(0) scale(0.98); }
  .btn-primary{ background:var(--gold); color:var(--gold-text); }
  .btn-primary:hover{ background:var(--gold-dark); }
  .btn-secondary{ background:var(--rose); color:#FBEFF2; }
  .btn-secondary:hover{ background:#A85763; }
  .btn-ghost{ background:transparent; border:1.5px solid var(--border); color:var(--ink); }
  .btn-ghost:hover{ border-color:var(--ink-soft); }
  .btn-block{ width:100%; }
  .btn:disabled{ opacity:0.45; cursor:not-allowed; transform:none; }

  .card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); }
  .pill{ display:inline-block; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:500; }

  input[type=text], input[type=email], input[type=tel], input[type=number], textarea, select{
    width:100%; font-family:inherit; font-size:14px; color:var(--ink);
    background:var(--surface-2); border:1.5px solid var(--border); border-radius:var(--radius-sm);
    padding:11px 14px; outline:none; transition:border-color .15s ease;
  }
  input:focus, textarea:focus, select:focus{ border-color:var(--gold); }
  label{ display:block; font-size:13px; font-weight:500; color:var(--ink-soft); margin-bottom:6px; }
  .field{ margin-bottom:18px; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media(max-width:640px){ .row2{ grid-template-columns:1fr; } }

  /* ---------- site nav ---------- */
  #sitenav{ position:sticky; top:38px; z-index:50; background:rgba(245,239,231,0.92); backdrop-filter:blur(6px); border-bottom:1px solid var(--border); }
  #sitenav .inner{ display:flex; align-items:center; justify-content:space-between; padding:16px 24px; max-width:1080px; margin:0 auto; }
  .logo{ display:flex; align-items:center; gap:9px; font-size:20px; letter-spacing:0.3px; }
  .navlinks{ display:flex; align-items:center; gap:28px; font-size:14px; font-weight:500; }
  .navlinks a{ opacity:0.8; }
  .navlinks a:hover{ opacity:1; }
  .cart-btn{ position:relative; display:flex; align-items:center; }
  .cart-count{
    position:absolute; top:-8px; right:-10px; background:var(--rose); color:#fff;
    font-size:10px; width:17px; height:17px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  }

  /* ---------- footer ---------- */
  footer{ margin-top:80px; padding:40px 24px; text-align:center; color:var(--ink-soft); font-size:13px; border-top:1px solid var(--border); }

  /* ---------- home ---------- */
  .hero{ padding:64px 24px 40px; text-align:center; }
  .hero h1{ font-size:40px; line-height:1.25; max-width:640px; margin:0 auto 16px; }
  .hero p.sub{ font-size:16px; color:var(--ink-soft); max-width:460px; margin:0 auto 30px; line-height:1.6; }
  .hero-art{ margin:0 auto 8px; }

  .section-title{ font-size:23px; margin-bottom:6px; }
  .section-sub{ font-size:14px; color:var(--ink-soft); margin-bottom:28px; }
  .section{ padding:56px 24px 8px; }

  .grid3{ display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
  @media(max-width:800px){ .grid3{ grid-template-columns:1fr 1fr; } }
  @media(max-width:560px){ .grid3{ grid-template-columns:1fr; } }

  .product-card{ padding:14px; transition:transform .15s ease, box-shadow .15s ease; }
  .product-card:hover{ transform:translateY(-3px); box-shadow:var(--shadow); }
  .product-img{ width:100%; height:150px; border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; margin-bottom:14px; position:relative; }
  .product-card h3{ font-size:15px; margin-bottom:4px; }
  .product-tagline{ font-size:13px; color:var(--ink-soft); line-height:1.5; margin-bottom:10px; min-height:38px; }
  .product-price{ font-size:14px; font-weight:700; margin-bottom:12px; }

  .testi-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
  @media(max-width:800px){ .testi-grid{ grid-template-columns:1fr; } }
  .testi-card{ padding:22px; font-size:14px; line-height:1.6; }
  .testi-name{ margin-top:14px; font-size:12px; color:var(--ink-soft); font-weight:500; }

  .cta-band{ margin:70px 24px 0; padding:48px 24px; border-radius:28px; background:var(--ink); color:#F5EFE7; text-align:center; }
  .cta-band h2{ font-size:26px; margin-bottom:10px; color:#fff; }
  .cta-band p{ color:#D8C9C3; margin-bottom:24px; font-size:14px; }

  /* ---------- shop / product detail ---------- */
  .pd-grid{ display:grid; grid-template-columns:1fr 1fr; gap:48px; align-items:start; }
  @media(max-width:800px){ .pd-grid{ grid-template-columns:1fr; gap:28px; } }
  .pd-image{ width:100%; aspect-ratio:1/1; border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; }
  .upload-zone{
    border:2px dashed var(--border); border-radius:var(--radius-md); padding:26px; text-align:center;
    cursor:pointer; transition:border-color .15s ease, background .15s ease;
  }
  .upload-zone:hover{ border-color:var(--gold); background:rgba(224,164,88,0.06); }
  .thumbs{ display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .thumb{ width:58px; height:58px; border-radius:10px; object-fit:cover; border:1px solid var(--border); }
  .trait-grid{ display:flex; flex-wrap:wrap; gap:8px; }
  .trait-chip{
    padding:8px 14px; border-radius:20px; border:1.5px solid var(--border); font-size:13px; background:var(--surface-2);
  }
  .trait-chip.selected{ background:var(--rose-light); border-color:var(--rose-light); color:var(--rose-text); font-weight:500; }
  .qty-stepper{ display:inline-flex; align-items:center; border:1.5px solid var(--border); border-radius:30px; overflow:hidden; }
  .qty-stepper button{ width:38px; height:38px; background:var(--surface-2); border:none; font-size:16px; }
  .qty-stepper span{ width:40px; text-align:center; font-weight:500; font-size:14px; }

  /* ---------- cart ---------- */
  .cart-item{ display:flex; gap:16px; padding:16px 0; border-bottom:1px solid var(--border); align-items:center; }
  .cart-item:last-child{ border-bottom:none; }
  .cart-thumb{ width:64px; height:64px; border-radius:12px; flex-shrink:0; }
  .cart-item-info{ flex:1; }
  .cart-item-name{ font-size:14px; font-weight:500; margin-bottom:2px; }
  .cart-item-meta{ font-size:12px; color:var(--ink-soft); }
  .summary-row{ display:flex; justify-content:space-between; font-size:14px; padding:6px 0; }
  .summary-row.total{ font-weight:700; font-size:17px; border-top:1px solid var(--border); margin-top:10px; padding-top:14px; }
  .empty-state{ text-align:center; padding:60px 20px; color:var(--ink-soft); }

  /* ---------- checkout ---------- */
  .checkout-grid{ display:grid; grid-template-columns:1.3fr 1fr; gap:40px; align-items:start; }
  @media(max-width:800px){ .checkout-grid{ grid-template-columns:1fr; } }

  /* ---------- confirmation ---------- */
  .confirm-wrap{ max-width:560px; margin:0 auto; text-align:center; padding:70px 24px; }
  .confirm-icon{ margin:0 auto 22px; }
  .order-num{ font-size:26px; font-weight:700; margin:6px 0 26px; letter-spacing:0.5px; }
  .steps-row{ display:flex; justify-content:space-between; margin:34px 0; }
  .step{ flex:1; text-align:center; font-size:11px; color:var(--ink-soft); position:relative; }
  .step-dot{ width:10px; height:10px; border-radius:50%; background:var(--border); margin:0 auto 8px; }
  .step.active .step-dot{ background:var(--gold); }

  /* ---------- admin ---------- */
  .admin-shell{ padding:32px 24px 80px; max-width:1100px; margin:0 auto; }
  .admin-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; flex-wrap:wrap; gap:12px; }
  table.orders{ width:100%; border-collapse:collapse; background:var(--surface-2); border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border); }
  table.orders th{ text-align:left; font-size:12px; color:var(--ink-soft); font-weight:500; padding:12px 16px; border-bottom:1px solid var(--border); }
  table.orders td{ padding:13px 16px; font-size:13px; border-bottom:1px solid var(--border); }
  table.orders tr:last-child td{ border-bottom:none; }
  table.orders tr.rowlink:hover{ background:rgba(224,164,88,0.06); cursor:pointer; }
  .status-badge{ font-size:11px; padding:4px 10px; border-radius:20px; font-weight:500; }

  .modal-overlay{ position:fixed; inset:0; background:rgba(61,47,46,0.35); display:flex; align-items:flex-start; justify-content:center; padding:40px 20px; overflow-y:auto; z-index:200; }
  .modal{ background:var(--surface-2); border-radius:var(--radius-lg); max-width:560px; width:100%; padding:28px; }
  .modal-close{ float:right; background:none; border:none; font-size:18px; color:var(--ink-soft); }

  /* ---------- approval page ---------- */
  .approval-wrap{ max-width:640px; margin:0 auto; padding:56px 24px 80px; }
  .approval-art{ width:100%; aspect-ratio:4/3; border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; margin-bottom:24px; }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#F5EFE7; padding:12px 22px; border-radius:30px; font-size:13px;
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease; z-index:300;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }
</style>
</head>
<body>

<div id="proto-bar">
  <span class="lbl">Prototype viewer — jump to any screen:</span>
</div>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============ mock data ============ */
const PRODUCTS = [
  { id:'custom-cat', name:'Custom cat sticker pack', price:18, tagline:"Your cat, hand-illustrated into a one-of-a-kind 5-sticker set.", accent:'gold', custom:true },
  { id:'momo', name:'Momo sticker collection', price:14, tagline:"A ready-made set inspired by a curious, food-obsessed tabby.", accent:'matcha', custom:false },
  { id:'meaka', name:'Meaka sticker collection', price:14, tagline:"A ready-made set inspired by a calm, watchful calico.", accent:'lavender', custom:false },
];

const TRAITS = ['Playful','Sleepy','Mischievous','Cuddly','Curious','Independent','Goofy','Gentle','Grumpy','Fearless'];

const STATUS_LIST = ['New','Artwork','Waiting for Approval','Printing','Shipping','Completed'];
const STATUS_COLOR = {
  'New': ['#E6F1FB','#0C447C'],
  'Artwork': ['#FAEEDA','#854F0B'],
  'Waiting for Approval': ['#FBEAF0','#993556'],
  'Printing': ['#EEEDFE','#3C3489'],
  'Shipping': ['#E1F5EE','#0F6E56'],
  'Completed': ['#EAF3DE','#3B6D11'],
};

let orders = [
  { id:'MK-10432', customer:'Sarah Kim', email:'sarah.k@email.com', status:'New', date:'Jul 10', petName:'Biscuit', notes:'Please keep the white chest patch — it\'s her signature marking.' },
  { id:'MK-10431', customer:'James Okoye', email:'james.o@email.com', status:'Artwork', date:'Jul 9', petName:'Loki', notes:'Loki has one blue eye, one green — please keep both visible.' },
  { id:'MK-10430', customer:'Priya Anand', email:'priya.a@email.com', status:'Waiting for Approval', date:'Jul 8', petName:'Mango', notes:'No special requests.' },
  { id:'MK-10429', customer:'Dana Reyes', email:'dana.r@email.com', status:'Printing', date:'Jul 6', petName:'Tofu', notes:'' },
  { id:'MK-10428', customer:'Leo Martins', email:'leo.m@email.com', status:'Shipping', date:'Jul 3', petName:'Pixel', notes:'' },
  { id:'MK-10427', customer:'Wren Osei', email:'wren.o@email.com', status:'Completed', date:'Jun 28', petName:'Comet', notes:'' },
];

const TESTIMONIALS = [
  { quote:"Biscuit's sticker pack is exactly her, right down to the crooked whisker.", name:'Sarah K.' },
  { quote:"I teared up a little opening the package. The artist really got his personality.", name:'James O.' },
  { quote:"Fast, thoughtful, and the packaging alone felt premium.", name:'Priya A.' },
];

/* ============ state ============ */
const state = {
  view:'home',
  activeProduct:null,
  cart:[],
  draft:{ petName:'', breed:'', traits:[], markings:'', requests:'', qty:1, images:[] },
  checkout:{ name:'', address:'', email:'', phone:'', card:'' },
  lastOrder:null,
  adminOpenOrder:null,
  approvalComment:'',
};

/* ============ helpers ============ */
function money(n){ return '$' + n.toFixed(2); }
function cartTotal(){ return state.cart.reduce((s,i)=> s + i.price*i.qty, 0); }
function cartCount(){ return state.cart.reduce((s,i)=> s + i.qty, 0); }
function newOrderId(){ return 'MK-' + Math.floor(10000 + Math.random()*89999); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}
function resetDraft(){
  state.draft = { petName:'', breed:'', traits:[], markings:'', requests:'', qty:1, images:[] };
}

function catIcon(color, size=54){
  return `<svg width="${size}" height="${size}" viewBox="0 0 64 64" fill="none">
    <path d="M14 10 L22 26 L10 26 Z" fill="${color}"/>
    <path d="M50 10 L54 26 L42 26 Z" fill="${color}"/>
    <circle cx="32" cy="36" r="20" fill="${color}"/>
    <circle cx="25" cy="34" r="2.4" fill="#3D2F2E"/>
    <circle cx="39" cy="34" r="2.4" fill="#3D2F2E"/>
    <path d="M29 41 Q32 44 35 41" stroke="#3D2F2E" stroke-width="2" stroke-linecap="round" fill="none"/>
  </svg>`;
}

const ACCENT_HEX = { gold:'var(--gold)', matcha:'var(--matcha)', lavender:'var(--lavender)' };

/* ============ render router ============ */
function render(){
  const app = document.getElementById('app');
  let html = '';
  switch(state.view){
    case 'home': html = renderHome(); break;
    case 'shop': html = renderShop(); break;
    case 'product': html = renderProductDetail(); break;
    case 'cart': html = renderCart(); break;
    case 'checkout': html = renderCheckout(); break;
    case 'confirmation': html = renderConfirmation(); break;
    case 'admin': html = renderAdmin(); break;
    case 'approval': html = renderApproval(); break;
  }
  app.innerHTML = html;
  renderProtoBar();
  window.scrollTo(0,0);
  const modal = document.getElementById('adminModal');
  if(modal) modal.scrollTop = 0;
}

function renderProtoBar(){
  const bar = document.getElementById('proto-bar');
  const views = [
    ['home','Home'],['shop','Shop'],['product','Product'],['cart','Cart'],
    ['checkout','Checkout'],['confirmation','Confirmation'],['admin','Admin'],['approval','Approval']
  ];
  bar.innerHTML = '<span class="lbl">Prototype viewer — jump to any screen:</span>' +
    views.map(([v,label]) => `<button class="${state.view===v?'active':''}" data-action="go" data-view="${v}">${label}</button>`).join('');
}

/* ============ site chrome ============ */
function nav(){
  return `
  <div id="sitenav">
    <div class="inner">
      <a class="logo" href="#" data-action="go" data-view="home">
        ${catIcon('var(--ink)', 26)}
        <span class="brandfont">memokame</span>
      </a>
      <div class="navlinks">
        <a href="#" data-action="go" data-view="home">Home</a>
        <a href="#" data-action="go" data-view="shop">Shop</a>
        <a class="cart-btn" href="#" data-action="go" data-view="cart">
          Cart
          ${cartCount()>0 ? `<span class="cart-count">${cartCount()}</span>` : ''}
        </a>
      </div>
    </div>
  </div>`;
}

function siteFooter(){
  return `<footer>memokame — made with a little extra love for the ones who deserve it.</footer>`;
}

/* ============ HOME ============ */
function renderHome(){
  return `
  ${nav()}
  <section class="hero">
    <div class="hero-art">${catIcon('var(--gold)', 84)}</div>
    <h1>Turn your best friend<br/>into a keepsake</h1>
    <p class="sub">Upload a photo and we'll hand-illustrate your pet into a one-of-a-kind sticker collection — a little piece of them, always with you.</p>
    <button class="btn btn-primary" data-action="go" data-view="shop">Create my companion</button>
  </section>

  <section class="section">
    <div class="wrap">
      <h2 class="section-title">Featured collections</h2>
      <p class="section-sub">Fully custom, or pick a ready-made set.</p>
      <div class="grid3">
        ${PRODUCTS.map(productCard).join('')}
      </div>
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <h2 class="section-title">What people are saying</h2>
      <p class="section-sub">A few notes from early companions.</p>
      <div class="testi-grid">
        ${TESTIMONIALS.map(t => `
          <div class="card testi-card">
            <p>"${t.quote}"</p>
            <p class="testi-name">— ${t.name}</p>
          </div>`).join('')}
      </div>
    </div>
  </section>

  <div class="cta-band">
    <h2>Ready to meet your companion?</h2>
    <p>Takes about 3 minutes to order. Production begins right after artwork approval.</p>
    <button class="btn btn-primary" data-action="go" data-view="shop">Create my companion</button>
  </div>

  ${siteFooter()}
  `;
}

function productCard(p){
  return `
  <div class="card product-card">
    <div class="product-img" style="background:${ACCENT_HEX[p.accent]}">
      ${catIcon('#FBF7F1', 44)}
    </div>
    <h3>${p.name}</h3>
    <p class="product-tagline">${p.tagline}</p>
    <p class="product-price">${money(p.price)}</p>
    <button class="btn btn-primary btn-block" data-action="open-product" data-id="${p.id}">Order</button>
  </div>`;
}

/* ============ SHOP ============ */
function renderShop(){
  return `
  ${nav()}
  <section class="section" style="padding-top:44px;">
    <div class="wrap">
      <h2 class="section-title">Shop</h2>
      <p class="section-sub">Custom pieces, made from your own photos, or a ready-made collection.</p>
      <div class="grid3">
        ${PRODUCTS.map(productCard).join('')}
      </div>
    </div>
  </section>
  ${siteFooter()}
  `;
}

/* ============ PRODUCT DETAIL ============ */
function renderProductDetail(){
  const p = PRODUCTS.find(x => x.id === state.activeProduct) || PRODUCTS[0];
  const d = state.draft;
  return `
  ${nav()}
  <section class="section" style="padding-top:44px;">
    <div class="wrap">
      <div class="pd-grid">
        <div>
          <div class="pd-image" style="background:${ACCENT_HEX[p.accent]}">
            ${catIcon('#FBF7F1', 90)}
          </div>
          ${p.custom ? `
          <div class="field" style="margin-top:20px;">
            <label>Upload 2–5 photos of your pet</label>
            <div class="upload-zone" data-action="trigger-upload">
              <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
              <p style="font-size:14px; font-weight:500; margin-bottom:4px;">Click to upload photos</p>
              <p style="font-size:12px; color:var(--ink-soft);">Clear, well-lit photos work best</p>
            </div>
            <div class="thumbs">
              ${d.images.map((src,i) => `<img class="thumb" src="${src}">`).join('')}
            </div>
            ${d.images.length>0 && d.images.length<2 ? `<p style="font-size:12px; color:var(--rose); margin-top:8px;">Add at least ${2-d.images.length} more photo${2-d.images.length>1?'s':''}.</p>` : ''}
          </div>` : ''}
        </div>

        <div>
          <h1 style="font-size:26px; margin-bottom:6px;">${p.name}</h1>
          <p style="font-size:18px; font-weight:700; color:var(--gold-dark); margin-bottom:18px;">${money(p.price)}</p>
          <p style="font-size:14px; color:var(--ink-soft); line-height:1.6; margin-bottom:26px;">${p.tagline}</p>

          ${p.custom ? `
          <div class="field">
            <label>Pet's name</label>
            <input type="text" id="petName" placeholder="e.g. Biscuit" value="${d.petName}">
          </div>
          <div class="field">
            <label>Breed <span style="font-weight:400; opacity:0.7;">(optional)</span></label>
            <input type="text" id="breed" placeholder="e.g. Tabby mix" value="${d.breed}">
          </div>
          <div class="field">
            <label>Three personality traits <span style="font-weight:400; opacity:0.7;">(pick 3)</span></label>
            <div class="trait-grid">
              ${TRAITS.map(t => `<button type="button" class="trait-chip ${d.traits.includes(t)?'selected':''}" data-action="toggle-trait" data-trait="${t}">${t}</button>`).join('')}
            </div>
          </div>
          <div class="field">
            <label>Special markings <span style="font-weight:400; opacity:0.7;">(optional)</span></label>
            <textarea id="markings" rows="2" placeholder="e.g. white patch on chest, notched ear">${d.markings}</textarea>
          </div>
          <div class="field">
            <label>Special requests <span style="font-weight:400; opacity:0.7;">(optional)</span></label>
            <textarea id="requests" rows="2" placeholder="Anything else the artist should know">${d.requests}</textarea>

          <div class="field">
            <label>Quantity</label>
            <div class="qty-stepper">
              <button type="button" data-action="qty-dec">−</button>

              <button type="button" data-action="qty-inc">+</button>
            </div>
          </div>

          <button class="btn btn-primary btn-block" data-action="add-to-cart" data-id="${p.id}">Add to cart — ${money(p.price*d.qty)}</button>
        </div>
      </div>
    </div>
  </section>
  ${siteFooter()}
  `;
}

/* ============ CART ============ */
function renderCart(){

  <section class="section" style="padding-top:44px;">
    <div class="wrap" style="max-width:700px;">
      <h2 class="section-title">Your cart</h2>

        <div class="empty-state">
          <p style="margin-bottom:18px;">Your cart is empty — no companions yet.</p>
          <button class="btn btn-primary" data-action="go" data-view="shop">Browse the shop</button>

        <div class="card" style="padding:8px 22px; margin-bottom:24px;">
          ${state.cart.map((item, idx) => `
            <div class="cart-item">
              <div class="cart-thumb" style="background:${ACCENT_HEX[item.accent]}; display:flex; align-items:center; justify-content:center;">
                ${catIcon('#FBF7F1', 30)}
              </div>
              <div class="cart-item-info">
                <p class="cart-item-name">${item.name}${item.petName ? ' — ' + item.petName : ''}</p>
                <p class="cart-item-meta">${money(item.price)} each</p>
              </div>
              <div class="qty-stepper">
                <button type="button" data-action="cart-dec" data-idx="${idx}">−</button>
                <span>${item.qty}</span>
                <button type="button" data-action="cart-inc" data-idx="${idx}">+</button>
              </div>

              <button type="button" data-action="cart-remove" data-idx="${idx}" style="background:none; border:none; color:var(--ink-soft); font-size:13px; margin-left:4px;">Remove</button>

        </div>

  `;
}

/* ============ CHECKOUT ============ */

            <h3 style="font-size:15px; margin-bottom:16px;">Shipping details</h3>

            <div class="field"><label>Shipping address</label><input type="text" id="ckAddress" value="${c.address}" placeholder="123 Sakura St, San Jose, CA"></div>
            <div class="row2">

          </div>

          <div class="card" style="padding:24px; margin-top:20px;">
            <h3 style="font-size:15px; margin-bottom:16px;">Payment <span style="font-weight:400; color:var(--ink-soft); font-size:12px;">(demo only)</span></h3>
            <div class="field"><label>Card number</label><input type="text" id="ckCard" value="${c.card}" placeholder="4242 4242 4242 4242"></div>

/* ============ CONFIRMATION ============ */

  ${nav()}

/* ============ ADMIN DASHBOARD ============ */

  const open = orders.find(o => o.id === state.adminOpenOrder);
  return `
  <div class="admin-shell">
    <div class="admin-head">
      <div>
        <h2 class="section-title" style="margin-bottom:2px;">Orders</h2>
        <p class="section-sub" style="margin-bottom:0;">${orders.length} total orders</p>
      </div>
      <button class="btn btn-ghost" data-action="export-orders">Export orders</button>
    </div>

function renderAdminModal(o){

    <div class="modal" id="adminModal" onclick="event.stopPropagation()">
      <button class="modal-close" data-action="admin-close">✕</button>
      <h3 style="font-size:18px; margin-bottom:2px;">${o.id}</h3>
      <p style="font-size:13px; color:var(--ink-soft); margin-bottom:18px;">${o.customer} · ${o.email}</p>

      <div class="field">
        <label>Status</label>
        <select id="statusSelect" data-action="admin-status" data-id="${o.id}">

/* ============ APPROVAL PAGE ============ */
function renderApproval(){
  const o = orders.find(x => x.status === 'Waiting for Approval') || orders[0];
  return `
  ${nav()}
  <div class="approval-wrap">
    <p style="font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px;">Artwork approval · ${o.id}</p>
    <h2 style="font-size:22px; margin-bottom:20px;">Take a look at ${o.petName}</h2>

    <div class="approval-art" style="background:var(--lavender);">
      ${catIcon('#FBF7F1', 100)}
    </div>

    <p style="font-size:14px; color:var(--ink-soft); margin-bottom:22px; line-height:1.6;">Here's the hand-illustrated artwork for your sticker collection. Approve it as-is, or request one revision before we move to printing.</p>

    <div class="field">
      <label>Comments <span style="font-weight:400; opacity:0.7;">(optional)</span></label>
      <textarea id="approvalComment" rows="3" placeholder="e.g. Could the ears be a touch bigger?">${state.approvalComment}</textarea>
    </div>

    <div style="display:flex; gap:12px; margin-top:8px;">
      <button class="btn btn-ghost" style="flex:1;" data-action="request-revision" data-id="${o.id}">Request revision</button>
      <button class="btn btn-primary" style="flex:1;" data-action="approve" data-id="${o.id}">Approve artwork</button>
    </div>

/* ============ event delegation ============ */
document.addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;

  if(action === 'go'){ state.view = el.dataset.view; render(); }

  else if(action === 'open-product'){
    state.activeProduct = el.dataset.id;
    resetDraft();
    state.view = 'product';
    render();
  }

  else if(action === 'trigger-upload'){
    document.getElementById('fileInput').click();
  }

  else if(action === 'toggle-trait'){
    const t = el.dataset.trait;
    const i = state.draft.traits.indexOf(t);
    if(i > -1){ state.draft.traits.splice(i,1); }
    else if(state.draft.traits.length < 3){ state.draft.traits.push(t); }
    else { toast('You can pick up to 3 traits'); }
    render();
  }

  else if(action === 'qty-inc'){ state.draft.qty++; render(); }
  else if(action === 'qty-dec'){ if(state.draft.qty>1) state.draft.qty--; render(); }

  else if(action === 'add-to-cart'){
    const p = PRODUCTS.find(x => x.id === el.dataset.id);
    if(p.custom && state.draft.images.length < 2){ toast('Please upload at least 2 photos'); return; }
    if(p.custom && !state.draft.petName.trim()){ toast("Please add your pet's name"); return; }
    state.cart.push({
      name:p.name, price:p.price, accent:p.accent, qty:state.draft.qty,
      petName: p.custom ? state.draft.petName : ''
    });
    toast('Added to cart');
    state.view = 'cart';
    render();
  }

  else if(action === 'cart-inc'){ state.cart[el.dataset.idx].qty++; render(); }
  else if(action === 'cart-dec'){ const i=el.dataset.idx; if(state.cart[i].qty>1) state.cart[i].qty--; render(); }
  else if(action === 'cart-remove'){ state.cart.splice(el.dataset.idx,1); render(); }

  else if(action === 'place-order'){
    if(state.cart.length === 0){ toast('Your cart is empty'); return; }
    if(!state.checkout.name.trim() || !state.checkout.address.trim() || !state.checkout.email.trim()){
      toast('Please fill in name, address and email');
      return;
    }
    const id = newOrderId();
    orders.unshift({
      id, customer:state.checkout.name, email:state.checkout.email, status:'New',
      date:'Today', petName: state.cart[0].petName || '—', notes:''
    });
    state.lastOrder = { id, name:state.checkout.name, email:state.checkout.email, address:state.checkout.address };
    state.cart = [];
    state.view = 'confirmation';
    render();
  }

  else if(action === 'admin-open'){ state.adminOpenOrder = el.dataset.id; render(); }
  else if(action === 'admin-close' || action === 'admin-close-bg'){ state.adminOpenOrder = null; render(); }

  else if(action === 'export-orders'){ toast('Orders exported (demo)'); }
  else if(action === 'download-images'){ toast('Images downloaded (demo)'); }

  else if(action === 'approve'){
    const o = orders.find(x => x.id === el.dataset.id);
    if(o){ o.status = 'Printing'; }
    toast('Artwork approved — moving to printing');
    render();
  }
  else if(action === 'request-revision'){
    toast('Revision requested — the artist has been notified');
  }
});

document.addEventListener('change', (e) => {
  if(e.target.id === 'fileInput'){
    const files = Array.from(e.target.files).slice(0, 5 - state.draft.images.length);
    files.forEach(f => {
      const url = URL.createObjectURL(f);
      state.draft.images.push(url);
      if(state.draft.images.length > 5) state.draft.images.length = 5;
      render();
    });
  }
  if(e.target.id === 'statusSelect'){
    const o = orders.find(x => x.id === e.target.dataset.id);
    if(o) o.status = e.target.value;
    render();
  }
});

document.addEventListener('input', (e) => {
  const id = e.target.id;
  const map = {
    petName:['draft','petName'], breed:['draft','breed'], markings:['draft','markings'], requests:['draft','requests'],
    approvalComment:[null,'approvalComment'],
    ckName:['checkout','name'], ckAddress:['checkout','address'], ckEmail:['checkout','email'], ckPhone:['checkout','phone'], ckCard:['checkout','card'],
  };
  if(map[id]){
    const [group, key] = map[id];
    if(group){ state[group][key] = e.target.value; } else { state[key] = e.target.value; }
  }
});

render();
</script>
